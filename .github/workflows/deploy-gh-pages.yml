name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'features/delivery/web/**'
      - '.github/workflows/deploy-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: features/delivery/web/package-lock.json

      - name: Install dependencies
        working-directory: features/delivery/web
        run: npm ci

      - name: Build with Vite
        working-directory: features/delivery/web
        run: npm run build
        env:
          VITE_API_BASE_URL: https://ryukijano-catcon-one-shot-controlnet-sd-1-5-b2.hf.space/api
          CI: false

      - name: Add SPA fallback and disable Jekyll
        working-directory: features/delivery/web
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: features/delivery/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
